name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build steam_helper (Linux)
        run: |
          cd steam_helper
          GOOS=linux GOARCH=amd64 go build -o bin/steam_helper_linux .

      - name: Build steam_helper (Windows)
        run: |
          cd steam_helper
          GOOS=windows GOARCH=amd64 go build -o bin/steam_helper.exe .

      - name: Build .vmz
        run: go run build.go rtv-coop release no-deploy

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: rtv-coop.vmz
          generate_release_notes: true
